<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리 반 감정 분포 및 사유 (교사 화면)</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; }
        .main-box { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; }
        .left-panel { position: relative; }
        .right-panel { width: 350px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 15px; height: 75vh; display: flex; flex-direction: column; }
        .list-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid #007aff; padding-bottom: 8px; margin-top: 0; color: #333; }
        .reason-list { flex: 1; overflow-y: auto; text-align: left; padding-right: 5px; }
        .reason-item { background: #f8f9fa; border-left: 4px solid #34c759; padding: 8px 12px; margin-bottom: 8px; border-radius: 0 8px 8px 0; }
        .reason-item .item-name { font-weight: bold; font-size: 13px; color: #007aff; }
        .reason-item .item-text { font-size: 14px; margin-top: 4px; color: #1c1c1e; word-break: break-all; }
        #mood-img { height: 75vh; width: auto; max-width: 100%; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .name-tag { position: absolute; padding: 4px 8px; background: rgba(255, 255, 255, 0.95); color: #1c1c1e; font-size: 13px; font-weight: bold; border: 2px solid #333; border-radius: 6px; transform: translate(-50%, -50%); white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h1>📊 우리 반 실시간 감정 날씨</h1>
    <div class="main-box">
        <div class="left-panel" id="canvas-container"><img id="mood-img" src="./moodmeter.png"></div>
        <div class="right-panel">
            <p class="list-title">💬 우리 반 감정 사유 (최신순)</p>
            <div class="reason-list" id="reason-container"></div>
        </div>
    </div>
    <script>
        // ⚠️ 주의: 여기에도 동일하게 구글 웹 앱 URL 주소를 넣어주세요!
        const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMEoztJ-rAOFfvdTxzZ8TdRsk9w5KkjZDlEqK3TFKHk6vfJ79vTPVHCuIRQWV2I2CCvA/exec";

        const container = document.getElementById('canvas-container');
        const reasonContainer = document.getElementById('reason-container');
        let renderedTimestamps = new Set();

        function drawNameTag(point) {
            const tag = document.createElement('div'); tag.className = 'name-tag';
            tag.style.left = point.x + '%'; tag.style.top = point.y + '%';
            tag.innerText = point.name; container.appendChild(tag);
        }
        function addReasonList(point) {
            const item = document.createElement('div'); item.className = 'reason-item';
            const nameSpan = document.createElement('div'); nameSpan.className = 'item-name'; nameSpan.innerText = point.name;
            const textSpan = document.createElement('div'); textSpan.className = 'item-text'; textSpan.innerText = point.reason;
            item.appendChild(nameSpan); item.appendChild(textSpan);
            reasonContainer.insertBefore(item, reasonContainer.firstChild);
        }

        // 구글 시트 데이터 수집 엔진 (3초마다 동기화)
        function checkNewData() {
            fetch(GOOGLE_WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
                if (data && Array.isArray(data)) {
                    data.forEach(point => {
                        if (!renderedTimestamps.has(point.timestamp)) {
                            renderedTimestamps.add(point.timestamp);
                            drawNameTag(point); addReasonList(point);
                        }
                    });
                }
            }).catch(() => {});
        }
        setInterval(checkNewData, 3000);
    </script>
</body>
</html>
